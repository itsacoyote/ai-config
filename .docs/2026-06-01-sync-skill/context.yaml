feature:
  name: "Sync Skill"
  short_name: "sync-skill"
  folder: ".docs/2026-06-01-sync-skill"
  date: "2026-06-01"
  branch: "feature/sync-skill"
  base_branch: "main"

workflow:
  current_step: plan
  completed_steps:
    - define
    - research
  checkpoint: ""
  escalated: false
  escalation_reason: ""
  summary: |
    Plan produced 3_plan.md for the sync skill — a two-task plan against two files. The
    deliverable is unchanged from Research's framing: a new `.claude/skills/sync/SKILL.md`
    and a small set of edits to `README.md`. Plan resolved the three open decisions
    Research flagged and locked the exact wording for the dirty-tree prompt, the
    per-ecosystem install confirmation, and the eight-section final summary into a
    Shared wording section at the bottom of 3_plan.md. Implement copies those blocks
    verbatim — no paraphrasing.

    Decisions locked: (1) `allowed-tools` uses the enumerated form, one line:
    `Read Bash(git *) Bash(gh *) Bash(npm *) Bash(yarn *) Bash(pnpm *) Bash(bun *)
    Bash(bundle *) Bash(uv *) Bash(poetry *) Bash(pipenv *) Bash(go *) Bash(cargo *)
    Bash(composer *) Bash(mix *) Bash(docker *) Bash(diff *) Bash(cat *) Bash(ls *)
    Bash(find *) Bash(grep *)`. Rejected `Bash(*)` — Sync is a read-mostly utility
    against the local environment and narrow permissions match the spec's
    non-destructive contract. (2) The README's `### PR review skill` heading is renamed
    to `### Standalone skills` so `/sync` and `/pr-review` sit together in one table,
    `/sync` as the first row (alphabetical). (3) `Skill(github-tool-preference)` is
    invoked at exactly two seams in SKILL.md prose: immediately before `git fetch
    origin` and immediately before `git pull --ff-only origin <main>`. Both seams sit
    inside the `## Branch switch and pull` section.

    Task ordering rationale: Task 1 lands the skill file (the substantive deliverable),
    Task 2 surfaces it through the README. Reversing this would briefly point the README
    at a non-existent skill. Each task ends in one Conventional Commit:
    `feat(skills): add sync skill for pre-feature local refresh` and
    `docs(readme): document /sync skill alongside /pr-review`.

    File map: SKILL.md is the only new file. README.md gets four discrete edits — heading
    rename, new `/sync` row above `/pr-review`, updated Usage line covering both skills,
    and one new `sync/` entry in the file-reference block alphabetically between `spec/`
    and `validate/`. No `.claude/settings.json` change is needed (Research confirmed
    skills register by directory presence). No subdirectories under `.claude/skills/sync/`
    — the skill prints to the user and writes no disk state.

    DRY/YAGNI calls: Plan deliberately omits a `references/` directory, a `template.md`,
    a separate agent file, and any settings.json registration. Each was considered and
    cut because Sync neither persists state nor produces structured artifacts. The skill
    is a single prose file plus README discoverability — nothing more.

    Implement should pay special attention to the Shared wording section. The em-dash
    character (—, U+2014) is intentional throughout — it matches the punctuation
    convention used in `pr-review/SKILL.md`. The eight-section final summary's numeric
    prefixes (`1.` through `8.`) are required by the spec's "fixed order" language; do
    not convert them to bullets.

