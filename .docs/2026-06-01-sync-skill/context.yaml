  summary: |
    Research produced 2_research.md for the sync skill. The deliverable is exactly two
    edits: a new `.claude/skills/sync/SKILL.md` and updates to `README.md`. There is no
    library code, no settings registration, no agent file, no template, no artifacts —
    Claude Code discovers skills purely by directory presence under `.claude/skills/`,
    confirmed by inspecting `.claude/settings.json` (only a hooks block) and
    `.claude/settings.local.json` (only Bash permissions). Plan can treat this as a
    documentation-shaped task, not a code-shaped one.

    `pr-review/SKILL.md` is the structural template to mirror: developer-invoked
    (`disable-model-invocation: true`), shell-heavy `allowed-tools`, ordered phase
    sections, table-driven confirmation prompts, exact-command fenced blocks, and a
    closing "What this skill will not do" enumeration. The lightweight skills
    (`git-commit`, `find-patterns`) confirm the minimum frontmatter shape but Sync needs
    more than the minimum.

    Frontmatter for Sync: `name: sync`, `description: ...`, `disable-model-invocation:
    true` (the field is used by 8 existing skills — confirmed convention, not flagged),
    and `allowed-tools`. No `argument-hint` (Sync takes no positional arg), no
    `user-invocable`, no `version`, no `license`.

    `allowed-tools` syntax in this repo is one-line space-separated with `Bash(<cmd> *)`
    glob form (literal space + asterisk — never `Bash(<cmd>:*)` and never bare `Bash`).
    Plan has a real trade-off to resolve: enumerate every binary the spec lists (~20
    `Bash(<x> *)` entries — safer, matches the spec's narrow non-destructive contract)
    versus `Bash(*)` (simpler, matches `implement` and `validate`, but overbroad).
    Research recommends the enumerated form because Sync is a read-mostly utility against
    the developer's local environment. `Read` should also appear because the skill reads
    `CLAUDE.md`, `AGENTS.md`, `.cursorrules`, `.windsurfrules`, `.env.example`, `.env`.

    `Skill(github-tool-preference)` must be invoked before each `git fetch` / `git pull`
    from origin, mirroring how `pr-review` invokes it before every `gh` shell-out. Plan
    should specify the seams explicitly in the SKILL.md prose. Sync never runs
    `git commit` or `gh pr create|edit`, so the `.claude/hooks/skill-check.sh` hook
    never fires during a `/sync` run.

    README.md needs two edits, not one: a new row in (or near) the existing "PR review
    skill" table (consider renaming that heading to a broader "Developer-invoked skills"
    or "Standalone skills" so `/sync` and `/pr-review` sit together), and a new
    `sync/` entry in the file-reference block at the bottom of the README, alphabetically
    between `spec/` and `validate/`.

    Open questions: none blocking. One trade-off (broad vs. enumerated `allowed-tools`)
    is flagged for Plan; both are valid per repo convention. The eight-section final
    summary and all confirmation prompts should be rendered as fenced exact-text blocks
    plus an "accepted inputs" table — the same pattern `pr-review` uses for its triage
    decisions — so the implementer has zero room to drift on wording or sequence.

