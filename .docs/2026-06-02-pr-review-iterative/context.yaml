  summary: |
    Implement completed all seven planned tasks plus one coherence fix across two files: `.claude/agents/code-reviewer.md` and `.claude/skills/pr-review/SKILL.md`. No new files were created, no files were deleted, and no frontmatter was changed. The branch has eight feature commits total (one per task plus the coherence fix).

    What was built: Task 1 added the `**Severity:**` bullet to `code-reviewer.md`'s "If there are issues" list and a matching Standards bullet, establishing the `CRITICAL / HIGH / MEDIUM / LOW / INFO` vocabulary as the producer-side contract. Tasks 2–7 edited `pr-review/SKILL.md`: Task 2 rewrote the "do not invent severity tags" refusal into two precise bullets (permit verbatim display, forbid posting labels in comment bodies). Task 3 updated the Triage Overview example to show `[HIGH]`/`[LOW]` prefixes and added the missing-label fallback rule, and updated the one-by-one prompt to show `Severity: <LABEL>` above Location/Problem/Fix. Task 4 inserted `## Detect mode` between Fetch and Delegate, resolving the authenticated login via `gh api user --jq .login`, filtering `comments[].author.login`, announcing the detected mode, and accepting `fresh`/`follow-up` overrides — with a three-row table for the final-mode resolution. Task 5 inserted `## Dedup against prior comments` with Normalization, Match rule, Output, and Terminal exit subsections, gated on the final resolved mode. Task 6 inserted `## Surface stale threads` with line-form and function-form regexes, staleness rules against the changed-files list and diff hunk headers, and a read-only output rule (emit nothing if empty, numbered list with URL if non-empty). Task 7 did the integration pass — confirmed section order, confirmed both follow-up sections are gated on "final resolved mode is follow-up", added the cross-reference sentence at the top of `## Triage findings`.

    Key finding during verify-coherence: the original terminal exit was wired inside `## Dedup` to fire before `## Surface stale threads` ran, meaning the message "Stale thread review above is still relevant" would reference output that had not yet appeared. The fix (committed after Task 7) changed the terminal exit to continue to `## Surface stale threads` as normal, then print the "No new findings" message and stop after that section completes. This is the only deviation from the literal plan text — the plan's Task 5 phrasing implied the exit fired immediately, but the spec's acceptance criterion (and the "above" reference in the terminal message) required stale threads to be surfaced first.

    Context for Validate: the two main areas warranting careful reading are (1) the terminal exit path in `## Dedup` — verify the sequencing now correctly reads Dedup → Stale → terminal message → stop, not Dedup terminal message → stop, and (2) the `## Detect mode` section's error paths — both `gh api user` failure and `gh pr view --json comments` failure must print stderr and stop with no silent fallback to first-review mode. The severity-label contract between the two files should be cross-checked: the vocabulary named in `code-reviewer.md`'s Severity bullet must match the vocabulary named in the `## What this skill will not do` bullet verbatim. There are no test artifacts to run; validation is by reading the edited sections against the spec's acceptance criteria (lines 131–150).

