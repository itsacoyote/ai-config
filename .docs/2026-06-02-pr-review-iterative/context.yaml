workflow:
  current_step: research  # Active step: define | research | plan | implement | validate | document | complete
  completed_steps:
    - define
  checkpoint: ""        # Free-text resume point within the current step. Set after each sub-task commit, cleared on handoff.
  escalated: false      # Set to true by an agent when it cannot resolve an issue after 3 attempts
  escalation_reason: "" # Human-readable description of what caused the escalation and what was tried
  summary: |
    Research completed and 2_research.md is committed. The feature edits two existing files in place — `.claude/skills/pr-review/SKILL.md` and `.claude/agents/code-reviewer.md` — and creates no new files, no new agents, and no persistence layer. The pr-review skill grows three new sections (mode detection, dedup, stale-thread surfacing) plus a small display tweak in triage to show severity labels; the code-reviewer agent gets one new requirement that fixes the per-finding label vocabulary at `CRITICAL` / `HIGH` / `MEDIUM` / `LOW` / `INFO`. Research confirmed against a live PR (`cli/cli#13547`) the exact JSON shape returned by `gh pr view --json comments` and saved that sample to `artifacts/gh-pr-view-comments-sample.json` for the Planner.

    Key findings and decisions for the Plan phase:
    1. The comment identifier returned by `--json comments` is the GraphQL node `id` (e.g. `IC_kwDODKw3uc8AAAABEMYhBw`), NOT `databaseId`. The spec's hedge "(or equivalent identifier)" applies — the Planner should pick `id` for in-memory keying and `url` for surfacing stale threads, and write that decision into `3_plan.md` so the implementer doesn't make it ad-hoc.
    2. `--json comments` returns ONLY top-level PR/issue comments, matching what `gh pr comment` posts. Inline review comments (anchored to diff lines) live under `reviews[].comments` / `latestReviews` and are out of scope. The spec's assumption is correct.
    3. The current pr-review skill at line 130 has a hard refusal that says "Do not invent severity tags (CRITICAL/HIGH/MEDIUM/LOW). Pass the code-reviewer's findings through as-is." This must be REWRITTEN (not deleted) — the "do not invent" half is now wrong (the agent emits labels legitimately) but the "pass through as-is" half is still right (the skill must surface labels verbatim, never re-rank or normalize). The Planner needs to schedule that rewrite explicitly.
    4. `code-reviewer` has two consumers in this repo: pr-review/SKILL.md (this feature) and skills/implement/SKILL.md (300–500-line review checkpoints during the Implement step). The severity-label addition is purely additive metadata — Implement reads agent output as prose and gates on the literal string "Approved — continue implementation.", which is unaffected. No second-order changes needed.
    5. The skill's frontmatter `allowed-tools: Read Bash(gh *) Bash(git *) Agent` already covers `gh api user` and `gh pr view --json comments`. No frontmatter edit is required.
    6. Stale detection is location-prefix-based; the prefix `**<path>:<line>** — ` is well-defined because the existing skill emits exactly that format. A simple regex extracts path + line. Comments without a parseable prefix are excluded from staleness, per the spec.
    7. Each comment object includes `viewerDidAuthor: bool` — a useful sanity-check signal even though the spec mandates the explicit `gh api user --jq .login` + `author.login` filter path.

    Context that shaped 2_research.md but isn't self-evident:
    - The repo's skill-file convention is one SKILL.md per folder (sync, pr-review, feature all single-file); only large reference-heavy skills get a `references/` subdir. The Planner should not propose splitting pr-review.
    - The "no new findings — all of code-reviewer's output matched comments you already posted" terminal message must bypass triage AND the post prompt entirely; the Planner should wire that exit so the post-confirmation never fires on zero kept findings.
    - First-review path must remain byte-identical to today aside from one announcement line. The dedup and stale steps must branch on the final resolved mode (after any `fresh`/`follow-up` override), not on the detected mode.

artifacts:
  - path: artifacts/gh-pr-view-comments-sample.json
    description: Live sample of `gh pr view 13547 -R cli/cli --json comments` showing the exact field names and types in a comments array (id, author.login, body, createdAt, url, viewerDidAuthor, isMinimized, etc.). Reference for dedup, mode-detection, and stale-detection logic.
    created_by: research
