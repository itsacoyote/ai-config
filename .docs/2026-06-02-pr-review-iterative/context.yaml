# context.yaml — feature workflow context
# Created by the /spec skill. Read and updated by each agent before handing off.
# To add new fields, extend this template and update agent-context/SKILL.md.

feature:
  name: "Iterative PR Review Skill"
  short_name: "pr-review-iterative"
  folder: ".docs/2026-06-02-pr-review-iterative"
  date: "2026-06-02"
  branch: "feature/pr-review-iterative"
  base_branch: "main"

workflow:
  current_step: plan  # Active step: define | research | plan | implement | validate | document | complete
  completed_steps:
    - define
    - research
  checkpoint: ""        # Free-text resume point within the current step. Set after each sub-task commit, cleared on handoff.
  escalated: false      # Set to true by an agent when it cannot resolve an issue after 3 attempts
  escalation_reason: "" # Human-readable description of what caused the escalation and what was tried
  summary: |
    Plan completed and 3_plan.md is committed. The feature edits two existing files in place — `.claude/agents/code-reviewer.md` (producer of the severity-label contract) and `.claude/skills/pr-review/SKILL.md` (consumer plus the three new follow-up sections). No new files, no deletions, no frontmatter change. The plan is broken into seven dependency-ordered tasks, each ending in a Conventional Commits commit.

    Key decomposition and ordering decisions:
    1. Task 1 updates `code-reviewer.md` first because it is the producer side of the severity-label contract — the skill cannot reliably display labels it has not been told to consume until the agent is required to emit them. The edit is small: one new bullet in "How to respond → If there are issues" and one new bullet in "Standards", both naming the fixed vocabulary `CRITICAL / HIGH / MEDIUM / LOW / INFO` with no `nit`. The `"Approved — continue implementation."` gate string is explicitly preserved so the Implement skill's mid-pipeline use of the agent keeps working.
    2. Tasks 2–7 edit the pr-review skill in dependency order: (2) rewrite the line-130 refusal first to remove the contradiction blocking every subsequent edit; (3) add severity-label display in Triage because it is mode-independent and touches the smallest surface; (4) insert `## Detect mode` between Fetch and Delegate to introduce the announce→override→resolve flow; (5) insert `## Dedup against prior comments` with normalization, match rule, output line, and the terminal "no new findings" exit; (6) insert `## Surface stale threads` with the line-form and function-form regexes and the read-only output rule; (7) an integration pass that confirms ordering, gating on the **final resolved mode** (not the detected mode), em-dash discipline, and that all existing hard refusals carry over.
    3. Locked decisions in the plan so the implementer does not re-litigate them: prior-comment identifier is the GraphQL node `id` (not `databaseId`, which `gh pr view --json comments` does not expose); `url` is used for stale-thread surfacing; `viewerDidAuthor` is a sanity check only, never the filter; the file stays a single `SKILL.md` (no `references/` split); frontmatter is unchanged.

    Context for the Implement phase:
    - The "tests" in this plan are **acceptance walk-throughs**, not executable test cases. There is no test harness for skill prose contracts in this repo. Each task names the observable behaviors that must read correctly end-to-end against the spec, and the implementer verifies by re-reading the edited section. This matches how prior skill-feature work in this repo was validated.
    - DRY: the gating sentence `This section runs only when the final resolved mode is follow-up.` is repeated at the top of both new follow-up sections — that is intentional duplication for safety, not a DRY violation. The implementer should not try to factor it out.
    - YAGNI: no new files, no helper modules, no abstractions extracted. The plan deliberately keeps each new section flat and self-contained.
    - Two-file ordering matters: Task 1 must commit before Task 3 (the first task that consumes the severity-label contract on the skill side) so the producer/consumer contract is never broken in the git history.
    - The terminal-exit message in Task 5 must bypass both `## Triage findings` and `### Post step`. Task 7's integration pass exists specifically to catch a miswire here — if it triggers triage on zero findings, the skill would ask "Post 0 comments now?" which is meaningless.
    - The recommended skill `verify-coherence` is the most relevant verification skill for Implement: the feature touches two files coupled by a contract and the skill itself gains several new sections that must remain internally consistent. Invoke it after Task 7 before validation.

artifacts:
  - path: artifacts/gh-pr-view-comments-sample.json
    description: Live sample of `gh pr view 13547 -R cli/cli --json comments` showing the exact field names and types in a comments array (id, author.login, body, createdAt, url, viewerDidAuthor, isMinimized, etc.). Reference for dedup, mode-detection, and stale-detection logic.
    created_by: research
recommended_skills:
  - skill: verify-coherence
    invoke_when: "After Task 7's integration pass, before handing off to Validate — the two edited files are coupled by the severity-label contract and the skill gains several new sections that must remain internally consistent (gating on final resolved mode, em-dash discipline, refusal-block coherence)."
output_artifacts: []
documentation_created: []
