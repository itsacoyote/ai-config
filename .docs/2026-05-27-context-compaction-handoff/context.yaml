# context.yaml — feature workflow context
# Created by the /spec skill. Read and updated by each agent before handing off.
# To add new fields, extend this template and update agent-context/SKILL.md.

feature:
  name: "Context compaction handoff"
  short_name: "context-compaction-handoff"
  folder: ".docs/2026-05-27-context-compaction-handoff"
  date: "2026-05-27"
  branch: "feature/context-compaction-handoff"
  base_branch: "main"

workflow:
  current_step: validate  # Active step: define | research | plan | implement | validate | document | complete
  completed_steps: [define, research, plan, implement]   # Ordered list of steps that have completed and handed off
  checkpoint: ""        # Free-text resume point within the current step. Set after each sub-task commit, cleared on handoff.
  escalated: false      # Set to true by an agent when it cannot resolve an issue after 3 attempts
  escalation_reason: "" # Human-readable description of what caused the escalation and what was tried
  summary: |
    Implement completed all nine tasks across nine individual commits.
    The diff spans nine files: template.yaml, agent-context/SKILL.md,
    feature/SKILL.md, and the six pipeline agent files (define.md,
    research.md, plan.md, implement.md, validate.md, document.md).
    No new files were created; no files were deleted. verify-coherence
    passed after all six agent edits landed.

    Key findings and decisions during implementation:
    Task 1 (template.yaml) was already modified in the working tree
    before the implementation loop started — it was committed as the
    first task with no additional edits needed. The plan was followed
    exactly with zero deviations. Each task's acceptance criteria block
    was verified before committing: gate sections unchanged where
    required, correct renumbering in after-workflow sections, summary
    wording verbatim from the Shared wording reference in 3_plan.md,
    and correct per-task substitutions (next agent, prior agent, prior
    step doc list) in each. The non-standard structural placements
    (Implement's summary write as new step 1 before the porcelain check;
    Document's summary write inside "Commit and push documentation"
    before the commit sentence) were applied as specified. Define
    correctly received only a summary-write step and no gate-read bullet.
    The /compact step in feature/SKILL.md is bare — no focus instructions.
    The **Status:** Draft inconsistency in the spec was not touched.

    Relevant context for Validate:
    This feature is documentation-only — all nine modified files are
    Markdown instruction documents and one YAML template. There is no
    application code, no test suite, and no runtime behavior to exercise.
    Validate should run a dry-run coherence check: (1) verify all nine
    files match the plan's file map and acceptance criteria, (2) confirm
    the gate-read bullet wording and summary-write instruction wording are
    consistent across the six agent files with correct per-task tokens,
    (3) confirm template.yaml parses as valid YAML, (4) confirm the
    feature/SKILL.md post-return protocol steps are numbered 1–8 with
    no gaps, (5) confirm no Out of Scope items were pulled in. The
    spec's acceptance criteria (#1–#8) are the primary checklist.
    No code review or QA browser session is needed.

artifacts: []
# Each entry describes a file created in the feature's artifacts/ folder.
# Populated by Research (and any later step that creates an artifact).
# Example entry:
# - path: artifacts/schema.png
#   description: ER diagram of the new tables added for this feature
#   created_by: research

recommended_skills:
  - skill: verify-coherence
    invoke_when: "After completing Tasks 4–9 (the six agent edits) and before handing off to Validate. The gate-read bullet wording and the summary-write instruction wording must match exactly across all six agent files, with only the per-task substitutions from the Shared wording reference in 3_plan.md varying. Verify-coherence is the right tool for catching drift across the six near-identical inserts."
# Skills the Plan agent determined are relevant for this feature's implementation.
# Populated during the Plan step. Read by the Implement agent before the implementation loop. Not modified by later steps.
# Example entry:
# - skill: security-review
#   invoke_when: "Before any task involving authentication, authorization, or input validation"

output_artifacts: []
# Each entry describes a screenshot or recording captured during QA as evidence
# that the feature works as specified. Saved to output-artifacts/.
# Populated by the QA Reviewer during the Validate step.
# Example entry:
# - path: output-artifacts/login-happy-path.png
#   description: Screenshot of successful login flow completing and redirecting to dashboard
#   user_story: As a user, I want to log in so that I can access my account
#   created_by: qa-review

documentation_created: []
# Each entry describes a new documentation file created by the Document agent.
# Only NEW files are listed here — updates to existing files (README, CLAUDE.md) are not.
# Useful for discovering what feature documentation was produced and where it lives.
