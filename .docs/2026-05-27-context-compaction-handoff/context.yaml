  short_name: "context-compaction-handoff"
  folder: ".docs/2026-05-27-context-compaction-handoff"
  date: "2026-05-27"
  branch: "feature/context-compaction-handoff"
  base_branch: "main"

workflow:
  current_step: document  # Active step: define | research | plan | implement | validate | document | complete
  completed_steps: [define, research, plan, implement, validate]   # Ordered list of steps that have completed and handed off
  checkpoint: ""        # Free-text resume point within the current step. Set after each sub-task commit, cleared on handoff.
  escalated: false      # Set to true by an agent when it cannot resolve an issue after 3 attempts
  escalation_reason: "" # Human-readable description of what caused the escalation and what was tried
  summary: |
    Document completed the documentation audit for the context-compaction-handoff
    feature. This is a pure documentation/instruction change — nine Markdown and
    YAML files modified, no application code. Two documentation surfaces required
    updates: CLAUDE.md and README.md.

    Key decisions during the documentation audit: CLAUDE.md's "context.yaml
    workflow fields" section was missing workflow.summary entirely — added it with
    a description of its purpose as the primary handoff narrative, its prose shape,
    and its overwrite-per-step lifecycle. The sentence listing which fields agents
    write was updated to include summary. README.md's context.yaml example in the
    "Key concepts" section showed the workflow block without the summary field —
    updated to include a representative summary block scalar so developers see the
    expected shape. The manual-resume instructions in "If the pipeline gets
    disrupted" referenced checkpoint but not summary — added a step directing
    developers to read workflow.summary first for orientation before checking
    checkpoint. No other README sections required changes: the pipeline stage
    descriptions don't cover internal orchestrator protocol, so the /compact
    invocation is correctly omitted from those prose descriptions. No new
    documentation files were created. agent-context/SKILL.md was already updated
    as part of the feature implementation itself and needed no further changes here.

    Relevant context for the human reviewer: the PR is PR #19
    (feat(workflow): context compaction handoff). The diff is nine files of
    Markdown and YAML. The highest-value things to review are (1) the wording
    consistency of the gate-read bullet and summary-write instruction across all
    six agent files in .claude/agents/, (2) the new "## Workflow summary" section
    in .claude/skills/agent-context/SKILL.md, and (3) the template.yaml addition.
    The CLAUDE.md and README.md documentation updates are light and can be
    reviewed quickly.

