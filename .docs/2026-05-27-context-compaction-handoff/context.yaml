# context.yaml — feature workflow context
# Created by the /spec skill. Read and updated by each agent before handing off.
# To add new fields, extend this template and update agent-context/SKILL.md.

feature:
  name: "Context compaction handoff"
  short_name: "context-compaction-handoff"
  folder: ".docs/2026-05-27-context-compaction-handoff"
  date: "2026-05-27"
  branch: "feature/context-compaction-handoff"
  base_branch: "main"

workflow:
  current_step: research  # Active step: define | research | plan | implement | validate | document | complete
  completed_steps: [define]   # Ordered list of steps that have completed and handed off
  checkpoint: ""        # Free-text resume point within the current step. Set after each sub-task commit, cleared on handoff.
  escalated: false      # Set to true by an agent when it cannot resolve an issue after 3 attempts
  escalation_reason: "" # Human-readable description of what caused the escalation and what was tried
  summary: |
    Research produced 2_research.md at
    .docs/2026-05-27-context-compaction-handoff/2_research.md, scoping the
    exact edits required to land the feature across nine files. No artifacts
    saved — the in-flight context.yaml and 1_spec.md already serve as worked
    examples for the summary shape and YAML block scalar pattern, so saving
    duplicates would have added noise.

    Key findings and decisions:
    - The change is mechanical and high-coverage: nine files, roughly ten
      small inserts, no deletions, no renames, no semantics changes to any
      existing field. Files in scope: six agents (define, research, plan,
      implement, validate, document), .claude/skills/feature/SKILL.md, and
      both files in .claude/skills/agent-context/ (SKILL.md and template.yaml).
    - Two halves of the same goal. /compact reclaims orchestrator-side
      context (the Approval Gate dialogue, post-return bookkeeping, anything
      the orchestrator reads itself). workflow.summary reclaims downstream-
      agent-side context (prior step docs are no longer the default first
      read). Important nuance confirmed via Claude Code docs: subagents
      already run in isolated context windows — /compact does not affect
      agent context loads, only the orchestrator's.
    - Define is the asymmetric agent. It gets only the "write summary"
      change, not the gate-read change, because it is the first step and
      has no prior summary to read. The Plan should call this out explicitly
      so the Implementer does not accidentally add a gate-read line to it.
    - /compact placement in the post-return protocol satisfies the "no
      compact on escalation" requirement structurally — the existing step 2
      halts on workflow.escalated: true before reaching the new /compact
      step. An explicit prose note still belongs in the protocol so intent
      is documented, not just structurally enforced.
    - Implement and Document have non-standard "after" sections. Implement's
      summary write belongs in "After all tasks complete" before the
      git status --porcelain check. Document's belongs in
      "Commit and push documentation" before the commit. Every other agent's
      summary write goes immediately before the existing commit step so the
      summary update folds into the per-step commit without changing
      commit messages or commit count.
    - /compact [instructions] is a built-in Claude Code slash command. Bare
      invocation (no focus instructions) matches the spec.

    Relevant context for Plan:
    - Place the new workflow.summary field LAST in the workflow block,
      after escalation_reason. Matches the in-flight context.yaml ordering,
      keeps the change additive and low-diff-noise.
    - Place the new "Workflow summary" section in agent-context/SKILL.md
      between "Resuming a disrupted workflow" and "Artifacts registry".
      Mirror the existing registry-section structure: purpose paragraph +
      YAML example + lifecycle note.
    - Suggested gate-read wording (one bullet to slot into the existing
      gate list): "Read workflow.summary from context.yaml first — this is
      your primary handoff narrative. Read prior step docs (1_spec.md, etc.)
      only on demand when you need a specific detail the summary does not
      carry." Match the surrounding gate's bullet vs numbered list style
      per file.
    - The template.yaml's new summary field should include an example block
      scalar in a comment underneath the field — the other free-text fields
      (checkpoint, escalation_reason) have no examples, but the summary's
      three required content areas are hard to convey in a one-line comment.
      Lift a trimmed example from the in-flight context.yaml.
    - Three open questions surfaced for Plan to decide:
      (1) Pre-existing spec **Status:** Draft vs research agent's gate check
          for **Status:** Approved is out of scope for this feature. Flag for
          visibility, do not fix here.
      (2) Bare /compact matches the spec; no focus instructions needed
          unless Planner explicitly wants to revisit.
      (3) Whether each downstream agent should explicitly acknowledge "I
          read the summary" in its opening message. Recommended yes — makes
          the acceptance criterion auditable without extra tooling. Add as
          a Plan task per agent if accepted.
    - Dry run is exercisable in this repo by running /feature against a
      small throwaway feature once the changes land. This feature's own
      in-flight context.yaml is already a working Define-written example;
      this Research summary will be the next example after commit.
    - No tests to write. Validation is the dry-run acceptance criterion
      plus an eyeball check on markdown rendering and YAML correctness.

artifacts: []
# Each entry describes a file created in the feature's artifacts/ folder.
# Populated by Research (and any later step that creates an artifact).
# Example entry:
# - path: artifacts/schema.png
#   description: ER diagram of the new tables added for this feature
#   created_by: research

recommended_skills: []
# Skills the Plan agent determined are relevant for this feature's implementation.
# Populated during the Plan step. Read by the Implement agent before the implementation loop. Not modified by later steps.
# Example entry:
# - skill: security-review
#   invoke_when: "Before any task involving authentication, authorization, or input validation"

output_artifacts: []
# Each entry describes a screenshot or recording captured during QA as evidence
# that the feature works as specified. Saved to output-artifacts/.
# Populated by the QA Reviewer during the Validate step.
# Example entry:
# - path: output-artifacts/login-happy-path.png
#   description: Screenshot of successful login flow completing and redirecting to dashboard
#   user_story: As a user, I want to log in so that I can access my account
#   created_by: qa-review

documentation_created: []
# Each entry describes a new documentation file created by the Document agent.
# Only NEW files are listed here — updates to existing files (README, CLAUDE.md) are not.
# Useful for discovering what feature documentation was produced and where it lives.
# Example entry:
# - path: docs/features/user-auth.md
#   description: Feature documentation for the user authentication flow
#   created_by: document
