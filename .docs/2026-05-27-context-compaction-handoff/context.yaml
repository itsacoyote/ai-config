# context.yaml — feature workflow context
# Created by the /spec skill. Read and updated by each agent before handing off.
# To add new fields, extend this template and update agent-context/SKILL.md.

feature:
  name: "Context compaction handoff"
  short_name: "context-compaction-handoff"
  folder: ".docs/2026-05-27-context-compaction-handoff"
  date: "2026-05-27"
  branch: "feature/context-compaction-handoff"
  base_branch: "main"

workflow:
  current_step: define  # Active step: define | research | plan | implement | validate | document | complete
  completed_steps: []   # Ordered list of steps that have completed and handed off
  checkpoint: ""        # Free-text resume point within the current step. Set after each sub-task commit, cleared on handoff.
  escalated: false      # Set to true by an agent when it cannot resolve an issue after 3 attempts
  escalation_reason: "" # Human-readable description of what caused the escalation and what was tried
  summary: |
    Define produced 1_spec.md for the "Context compaction handoff" feature and
    then revised it in response to user feedback that reframed the purpose of
    the summary field.

    What was accomplished: a complete spec landed at
    .docs/2026-05-27-context-compaction-handoff/1_spec.md describing a new
    workflow.summary field in context.yaml, written by every pipeline agent
    before returning, plus a /compact invocation in the /feature orchestrator's
    post-return protocol. After the first draft, the user clarified that the
    summary is not supplementary — it IS the primary handoff narrative. The
    spec was rewritten so that progressive context loading is an explicit goal:
    the next agent reads workflow.summary as its primary context source and
    only opens prior step docs/artifacts on demand when it needs detail the
    summary deliberately omits.

    Key findings and decisions:
    - Summary shape: outcome-focused prose, ~300-500 tokens, overwritten each
      step. Three required content areas, in order: (1) what was accomplished,
      (2) key findings and decisions, (3) relevant context for the next phase
      (gotchas, constraints, scope boundaries).
    - Authorship: each agent writes its own summary inline before returning.
      No separate summarize step or agent.
    - Purpose: primary handoff narrative for progressive context loading. The
      summary is self-contained — the next agent should be able to start work
      from it alone in the common case. Prior step docs remain authoritative
      but are read on demand only.
    - Orchestrator change: /compact runs unconditionally after every step
      transition (including after Define on spec approval) EXCEPT when halting
      on an escalation. On escalation, the conversation stays intact.
    - Lifecycle: summary write is folded into the existing per-step commit
      alongside the step doc and context.yaml. No separate commit. No change
      to commit/push cadence or escalation semantics.

    Relevant context for Research:
    - Files to study: six agent files in .claude/agents/ (define, research,
      plan, implement, validate, document), the orchestrator skill at
      .claude/skills/feature/SKILL.md, the agent-context skill at
      .claude/skills/agent-context/ (both SKILL.md and template.yaml), and the
      in-flight context.yaml for this feature (which already demonstrates the
      field shape and YAML block scalar pattern).
    - No existing fields change semantics — checkpoint, escalated,
      escalation_reason, completed_steps, current_step all retain meaning.
      The new field is purely additive.
    - Acceptance criteria include a dry-run validation: summary reflects the
      just-completed step, covers all three content areas, /compact ran, and
      the next agent's gate logs reading the summary as its primary handoff.
      Research should surface how that dry-run can be exercised in this repo.

artifacts: []
# Each entry describes a file created in the feature's artifacts/ folder.
# Populated by Research (and any later step that creates an artifact).
# Example entry:
# - path: artifacts/schema.png
#   description: ER diagram of the new tables added for this feature
#   created_by: research

recommended_skills: []
# Skills the Plan agent determined are relevant for this feature's implementation.
# Populated during the Plan step. Read by the Implement agent before the implementation loop. Not modified by later steps.
# Example entry:
# - skill: security-review
#   invoke_when: "Before any task involving authentication, authorization, or input validation"

output_artifacts: []
# Each entry describes a screenshot or recording captured during QA as evidence
# that the feature works as specified. Saved to output-artifacts/.
# Populated by the QA Reviewer during the Validate step.
# Example entry:
# - path: output-artifacts/login-happy-path.png
#   description: Screenshot of successful login flow completing and redirecting to dashboard
#   user_story: As a user, I want to log in so that I can access my account
#   created_by: qa-review

documentation_created: []
# Each entry describes a new documentation file created by the Document agent.
# Only NEW files are listed here — updates to existing files (README, CLAUDE.md) are not.
# Useful for discovering what feature documentation was produced and where it lives.
# Example entry:
# - path: docs/features/user-auth.md
#   description: Feature documentation for the user authentication flow
#   created_by: document
