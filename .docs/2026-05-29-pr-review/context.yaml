# context.yaml — feature workflow context
# Created by the /spec skill. Read and updated by each agent before handing off.
# To add new fields, extend this template and update agent-context/SKILL.md.

feature:
  name: "PR Review Skill"
  short_name: "pr-review"
  folder: ".docs/2026-05-29-pr-review"
  date: "2026-05-29"
  branch: "feature/pr-review"
  base_branch: "main"

workflow:
  current_step: research  # Active step: define | research | plan | implement | validate | document | complete
  completed_steps: [define]   # Ordered list of steps that have completed and handed off
  checkpoint: ""        # Free-text resume point within the current step. Set after each sub-task commit, cleared on handoff.
  escalated: false      # Set to true by an agent when it cannot resolve an issue after 3 attempts
  escalation_reason: "" # Human-readable description of what caused the escalation and what was tried
  summary: |
    Research produced 2_research.md by surveying every SKILL.md in
    .claude/skills/, the code-reviewer and senior-reviewer agents, and the gh
    CLI surface (v2.92.0). The new skill is a single-file addition at
    .claude/skills/pr-review/SKILL.md — no template.md, no scripts/, no
    references/. Frontmatter mirrors the four existing slash-command skills
    that use $ARGUMENTS (analyze-code, find-patterns, web-search, feature):
    name: pr-review, a tight one-sentence description, argument-hint:
    "[pr-number]", disable-model-invocation: true (to block auto-invocation
    per spec), and allowed-tools: Read Bash(gh *) Bash(git *) Agent. The
    Agent permission is what lets the skill delegate to code-reviewer the way
    implement and validate already do — by prose, no formal protocol.

    Key findings and decisions. (1) The code-reviewer agent's existing gate
    reads context.yaml and 3_plan.md, so the skill's handoff text must
    explicitly tell it "this is an external PR, no plan exists, skip plan
    alignment, review engineering quality only" — otherwise the agent errors
    on the missing feature folder. The agent's existing Location / Problem /
    Fix output shape is reused unchanged. (2) gh has every subcommand needed:
    gh repo view --json nameWithOwner, gh pr view <n> --json
    number,title,body,author,state,baseRefName,headRefName,files, gh pr diff
    <n>, and gh pr comment <n> --body-file -. The --body-file - form is
    safer than --body "<text>" because findings contain backticks, dollar
    signs, and newlines that are awkward to shell-escape. (3) The forbidden
    commands gh pr review --approve and gh pr review --request-changes are
    real and must be named in the skill body as explicit negatives — the only
    enforcement layer is the prose, so wording is load-bearing.

    Three open questions resolved with recommendations for Plan. Triage UX:
    default to one-by-one with a `batch` opt-in at the first prompt for >10
    findings. Comment formatting: prefix every posted comment with
    **path/to/file:line** — , using the em-dash separator to match project
    style. Edit mechanism: inline rewrite — skill prints the finding, user
    pastes the revised version verbatim, no conversational interpretation.

    Context for Plan. File map is one entry: New Files → .claude/skills/
    pr-review/SKILL.md. No tests, no linter, no coverage tasks — there is
    nothing to test except the markdown. The skill body needs five sections:
    (a) what it does + $ARGUMENTS handling, (b) Fetch workflow (gh repo view
    → validate PR number → gh pr view + gh pr diff), (c) Delegate to
    code-reviewer with the no-plan handoff text, (d) Triage UX with explicit
    accepted-input table, (e) hard-bounded "What this skill will not do"
    section that names gh pr review --approve and --request-changes by flag.
    Skill(github-tool-preference) is invoked once near the top of the
    workflow per the project memory rule. No artifacts were produced — all
    findings live in 2_research.md.

artifacts: []

