# context.yaml — feature workflow context
# Created by the /spec skill. Read and updated by each agent before handing off.
# To add new fields, extend this template and update agent-context/SKILL.md.

feature:
  name: "PR Review Skill"
  short_name: "pr-review"
  folder: ".docs/2026-05-29-pr-review"
  date: "2026-05-29"
  branch: "feature/pr-review"
  base_branch: "main"

workflow:
  current_step: implement  # Active step: define | research | plan | implement | validate | document | complete
  completed_steps: [define, research, plan]   # Ordered list of steps that have completed and handed off
  checkpoint: ""        # Free-text resume point within the current step. Set after each sub-task commit, cleared on handoff.
  escalated: false      # Set to true by an agent when it cannot resolve an issue after 3 attempts
  escalation_reason: "" # Human-readable description of what caused the escalation and what was tried
  summary: |
    Plan produced 3_plan.md decomposing the pr-review skill into seven
    tasks. The file map has exactly one entry — New Files →
    .claude/skills/pr-review/SKILL.md — and no modified or deleted files.
    Decomposition happens inside the file via H2 sections (one section per
    spec requirement) rather than across files, because every directive the
    model executes is part of the same prose contract and splitting would
    violate YAGNI. There is no code to test, no template document to
    render, no helper script — the deliverable is a single markdown file
    with YAML frontmatter, verified by reading it against the spec's
    acceptance criteria.

    Task ordering and rationale. Task 1 creates the directory and writes
    frontmatter + the five H2 skeleton headers, so the file is born valid
    and every subsequent task fills one section without breaking the others.
    Tasks 2–6 each own one H2 section in the order the user-facing workflow
    runs (What this does + input validation → Fetch → Delegate → Triage →
    Non-Goals/refusal). This ordering matches the model's top-to-bottom
    reading order so each commit can be reviewed by reading the new section
    in isolation. Task 7 is a verification pass that maps each acceptance
    criterion (AC1–AC13) to a specific sentence in the file and adds a
    final tightening commit only if a gap is found.

    DRY/YAGNI calls the Implement agent must respect. (1) Do not create
    template.md, scripts/, or references/ under pr-review/ — Research is
    explicit the skill is a single SKILL.md file. (2) Do not add
    unit-test, lint, or coverage tasks — there is nothing to test except
    the markdown. (3) Do not modify the code-reviewer agent; the skill
    consumes it unchanged and supplies the no-plan handoff text in prose.
    (4) Do not invent severity tags on findings — the code-reviewer's
    Location/Problem/Fix shape passes through verbatim.

    Load-bearing wording for Implement. The forbidden commands `gh pr
    review --approve` and `gh pr review --request-changes` must be named
    by exact flag in the Non-Goals section (Task 6) — this is the entire
    enforcement layer. The no-plan handoff text in Task 4 is quoted
    verbatim from Research and must be reproduced word-for-word in the
    SKILL.md so the code-reviewer agent does not error on the missing
    feature folder. The Post step (Task 5) must specify `printf '%s' "..."
    | gh pr comment <n> --body-file -` (not `--body "<text>"`) to avoid
    shell-escaping bugs on findings containing backticks, dollar signs, or
    newlines. The triage accepted-inputs table in Task 5 is a literal
    markdown table — the model needs a deterministic decision surface, not
    prose interpretation. Frontmatter sets disable-model-invocation: true
    so the skill never auto-fires. recommended_skills is empty: the
    feature has no auth, no external APIs new to the repo, no algorithms,
    and no multi-file consistency concerns, so none of the four optional
    review skills are warranted.

artifacts: []

recommended_skills: []

output_artifacts: []

documentation_created: []
