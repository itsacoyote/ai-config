# context.yaml — feature workflow context
# Created by the /spec skill. Read and updated by each agent before handing off.
# To add new fields, extend this template and update agent-context/SKILL.md.

feature:
  name: ""              # Full feature name (matches spec title)
  short_name: ""        # Folder slug used in the path (e.g. user-auth)
  folder: ""            # Relative path to feature folder (e.g. .docs/2026-05-11-user-auth)
  date: ""              # ISO date when Define ran (YYYY-MM-DD)
  branch: ""            # Feature branch name (e.g. feature/user-auth)
  base_branch: ""       # Branch this feature was cut from (e.g. main, master, develop)

workflow:
  current_step: define  # Active step: define | research | plan | implement | validate | document | complete
  completed_steps: []   # Ordered list of steps that have completed and handed off
  checkpoint: ""        # Free-text resume point within the current step. Set after each sub-task commit, cleared on handoff.
  escalated: false      # Set to true by an agent when it cannot resolve an issue after 3 attempts
  escalation_reason: "" # Human-readable description of what caused the escalation and what was tried
  summary: ""           # Outcome-focused prose summary of the most recent completed step. Overwritten per step. Primary handoff narrative for the next agent — enables progressive context loading.
  # Example of a well-formed summary (block scalar with three content areas):
  # summary: |
  #   Plan produced 3_plan.md — a nine-task linear plan covering every file in
  #   scope. No new files, no deletions. Each task ends in a single conventional
  #   commit; commit count for this feature is nine.
  #
  #   Key findings and decisions: task ordering is template-first, then skill
  #   docs, then agents in pipeline order. Shared wording for gate-read and
  #   summary-write is codified once at the bottom of 3_plan.md to prevent
  #   drift across the six near-identical agent edits.
  #
  #   Relevant context for Implement: invoke verify-coherence after completing
  #   all six agent edits. Do not paraphrase the shared wording — copy verbatim
  #   and substitute only the per-task tokens listed in the substitution tables.

artifacts: []
# Each entry describes a file created in the feature's artifacts/ folder.
# Populated by Research (and any later step that creates an artifact).
# Example entry:
# - path: artifacts/schema.png
#   description: ER diagram of the new tables added for this feature
#   created_by: research

recommended_skills: []
# Skills the Plan agent determined are relevant for this feature's implementation.
# Populated during the Plan step. Read by the Implement agent before the implementation loop. Not modified by later steps.
# Example entry:
# - skill: security-review
#   invoke_when: "Before any task involving authentication, authorization, or input validation"

output_artifacts: []
# Each entry describes a screenshot or recording captured during QA as evidence
# that the feature works as specified. Saved to output-artifacts/.
# Populated by the QA Reviewer during the Validate step.
# Example entry:
# - path: output-artifacts/login-happy-path.png
#   description: Screenshot of successful login flow completing and redirecting to dashboard
#   user_story: As a user, I want to log in so that I can access my account
#   created_by: qa-review

documentation_created: []
# Each entry describes a new documentation file created by the Document agent.
# Only NEW files are listed here — updates to existing files (README, CLAUDE.md) are not.
# Useful for discovering what feature documentation was produced and where it lives.
# Example entry:
# - path: docs/features/user-auth.md
#   description: Feature documentation for the user authentication flow
#   created_by: document
